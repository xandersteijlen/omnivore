version: '3.8'
services:
  postgres:
    image: ankane/pgvector:v0.5.1
    # NO PORT - internal only (avoids coolify-db 5432)
    volumes: [pgdata:/var/lib/postgresql/data]
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: exit 0
      interval: 2s
      timeout: 12s
      retries: 3

  redis:
    image: redis:7.2.4
    # NO PORT - internal only (avoids coolify-redis 6379)
    volumes: [redis_data:/data]
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "10101:9000"  # Custom port (coolify uses 9000)
    volumes: [minio_data:/data]
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniominio
    command: server /data --console-address :9001
    restart: unless-stopped

  # All other services (api, web, etc.) as before
  # Use their normal ports (3000, 4000, 7070, etc.) - all free
